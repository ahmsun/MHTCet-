  {q:"If lactose absent, operon is?", options:["ON","OFF","Active","Mutated"], ans:1},
  {q:"If lactose present, operon is?", options:["OFF","ON","Mutated","Silent"], ans:1},
  {q:"Genetic code is?", options:["Universal","Overlapping","Ambiguous","Variable"], ans:0},
  {q:"Central dogma proposed by?", options:["Mendel","Watson","Crick","Darwin"], ans:2}
]
  }
};

function loadChapters(){
  let s=document.getElementById("subject").value;
  let ch=document.getElementById("chapter");

  ch.innerHTML='<option>Select Chapter</option>';

  if(data[s]){
    for(let i in data[s]){
      let name=i;

      // 👇 readable names
      if(i==="B1") name="Inheritance and Variation";
      if(i==="B2") name="Molecular Basis of Inheritance";

      ch.innerHTML+=`<option value="${i}">${name}</option>`;
    }
  }
}

let qData=[],current=0,score=0,answered=false,timer,timeLeft=30;

function startQuiz(){
  let s=document.getElementById("subject").value;
  let c=document.getElementById("chapter").value;

  if(!s||!c){alert("Select properly");return;}

  qData=data[s][c];
  current=0;score=0;

  document.getElementById("quizBox").classList.remove("hidden");
  loadQ();
}

function startTimer(){
  clearInterval(timer);
  timeLeft=30;
  document.getElementById("timer").innerText="Time: "+timeLeft;

  timer=setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText="Time: "+timeLeft;
    if(timeLeft<=0){
      nextQuestion();
    }
  },1000);
}

function loadQ(){
  answered=false;
  startTimer();

  let q=qData[current];
  document.getElementById("question").innerText=q.q;

  let html="";
  q.options.forEach((o,i)=>{
    html+=`<div class="option" onclick="checkAns(${i},this)">${o}</div>`;
  });

  document.getElementById("options").innerHTML=html;
}

function checkAns(i,el){
  if(answered)return;
  answered=true;

  let correct=qData[current].ans;
  let opts=document.querySelectorAll(".option");

  opts.forEach((o,index)=>{
    if(index===correct)o.classList.add("correct");
  });

  if(i===correct){
    score++;
    document.getElementById("correctSound").play();

    confetti({particleCount:100,spread:70,origin:{y:0.6}});
  } else {
    el.classList.add("wrong");
    document.getElementById("wrongSound").play();
  }
}

function nextQuestion(){
  current++;
  if(current<qData.length){
    loadQ();
  } else {
    clearInterval(timer);
    showResult();
  }
}

function showResult(){
  document.getElementById("question").innerText="🎉 Finished!";
  document.getElementById("options").innerHTML="";
  document.getElementById("score").innerText="Score: "+score+"/"+qData.length;

  let percent=(score/qData.length)*100;
  let rank="";
  if(percent>90) rank="🏆 AIR 1-100";
  else if(percent>70) rank="🥇 Topper";
  else if(percent>50) rank="🥈 Average";
  else rank="🥉 Improve";

  document.getElementById("rank").innerText="Rank: "+rank;
}

</script>
